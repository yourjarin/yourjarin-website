<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Jarin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff1493,#ff69b4,#ffb6c1);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
text-align:center;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero{
padding:40px 20px;
}

.hero h1{
font-size:50px;
text-shadow:0 0 20px white;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

.main{
width:90%;
max-width:500px;
border-radius:25px;
margin-top:25px;
box-shadow:
0 0 20px #fff,
0 0 40px #ff69b4,
0 0 80px #ff1493;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:white;
color:#ff1493;
font-weight:bold;
text-decoration:none;
border-radius:40px;
font-size:18px;
box-shadow:0 0 20px white;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.section-title{
margin-top:50px;
font-size:32px;
text-shadow:0 0 15px white;
}

.gallery{
padding:20px;
}

.gallery img{
width:95%;
max-width:500px;
margin:15px 0;
border-radius:20px;
box-shadow:
0 0 15px white,
0 0 35px #ff69b4;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.card{
width:90%;
max-width:700px;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,.4);
}

.footer{
padding:30px;
font-size:15px;
}

</style>
</head>

<body>

<div class="hero">

<h1>💖 Your Jarin 💖</h1>

<p>Official Premium Website</p>

<img src="photo3.png" class="main">

<br>

<a href="https://t.me/JarinRahmann" class="btn">
📱 Join Telegram
</a>

</div>

<div class="card">
<h2>✨ Welcome ✨</h2>
<br>
<p>
Welcome to the official website of Your Jarin.
Explore exclusive photos, updates and premium content.
</p>
</div>

<h2 class="section-title">🌸 Photo Gallery 🌸</h2>

<div class="gallery">

<img src="photo1.png">

<img src="photo2.png">

<img src="photo3.png">

<img src="photo4.png">

<img src="photo5.png">

</div>

<div class="footer">
💗 Your Jarin © 2025
</div>

</body>
</html>
